
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Vision Ultimate Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
font-family:'Plus Jakarta Sans',sans-serif;
}

body{
background:#090d16;
color:white;
}

.card{
background:#131926;
border:1px solid rgba(255,255,255,.05);
backdrop-filter:blur(12px);
}

.dropdown{
display:none;
}

.dropdown.show{
display:block;
animation:fade .25s ease;
}

.period-grid{
display:none;
}

.period-grid.show{
display:grid;
animation:fade .25s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(-8px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.arrow{
transition:.3s;
}

.arrow.rotate{
transform:rotate(180deg);
}

input{
outline:none;
}
</style>

</head>

<body class="min-h-screen pb-24">

<div class="max-w-6xl mx-auto p-4 lg:p-8">

<!-- HEADER -->

<div class="card rounded-[32px] p-5 mb-6">

<div class="flex justify-between items-center gap-5 flex-wrap">

<div>
<p class="uppercase tracking-[5px] text-emerald-400 text-[10px] font-bold">
FINANCE VISION
</p>

<h1 class="text-2xl lg:text-3xl font-black mt-2">
Dashboard Financiero
</h1>
</div>

<div class="text-right">

<p class="text-slate-400 text-[10px] uppercase">
TOTAL GENERAL
</p>

<h2 id="totalGeneral"
class="text-4xl font-black text-emerald-400 mt-2">
$0
</h2>

<p id="textoPeriodo"
class="text-sm text-slate-400 mt-2">
Total semanal: $0
</p>

</div>

</div>

<!-- BARRAS -->

<div class="mt-6 space-y-4">

<div>

<div class="flex justify-between text-xs mb-2">
<span>Total General</span>
<span id="porcentajeGeneral">0%</span>
</div>

<div class="w-full bg-slate-900 rounded-full h-4 overflow-hidden">
<div id="barraGeneral"
class="h-4 rounded-full bg-gradient-to-r from-emerald-500 to-cyan-400 transition-all duration-500"
style="width:0%">
</div>
</div>

</div>

<div>

<div class="flex justify-between text-xs mb-2">
<span id="tituloPeriodo">
Total semanal
</span>

<span id="porcentajePeriodo">
0%
</span>
</div>

<div class="w-full bg-slate-900 rounded-full h-3 overflow-hidden">
<div id="barraPeriodo"
class="h-3 rounded-full bg-gradient-to-r from-violet-500 to-fuchsia-400 transition-all duration-500"
style="width:0%">
</div>
</div>

</div>

</div>

<!-- PERIODO -->

<div class="mt-5">

<button onclick="togglePeriodo()"
class="w-full bg-black/30 border border-slate-700 rounded-2xl p-4 flex justify-between items-center">

<span class="font-semibold">
📅 Cambiar Periodo
</span>

<span id="flechaPeriodo" class="arrow">
▼
</span>

</button>

<div id="periodoBox"
class="period-grid mt-3 grid-cols-2 md:grid-cols-4 gap-3">

<button onclick="cambiarPeriodo('semanal')"
class="bg-slate-800 hover:bg-slate-700 rounded-2xl p-3 font-bold">
Semanal
</button>

<button onclick="cambiarPeriodo('mensual')"
class="bg-slate-800 hover:bg-slate-700 rounded-2xl p-3 font-bold">
Mensual
</button>

<button onclick="cambiarPeriodo('trimestral')"
class="bg-slate-800 hover:bg-slate-700 rounded-2xl p-3 font-bold">
Trimestral
</button>

<button onclick="cambiarPeriodo('semestral')"
class="bg-slate-800 hover:bg-slate-700 rounded-2xl p-3 font-bold">
Semestral
</button>

</div>

</div>

<!-- TOTALES -->

<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">

<div class="card rounded-[28px] p-5">
<p class="text-slate-400 text-sm">🏍️ Moto</p>
<h2 id="motoTotal" class="text-3xl font-black mt-3">$0</h2>
</div>

<div class="card rounded-[28px] p-5">
<p class="text-slate-400 text-sm">📦 Ventas</p>
<h2 id="ventasTotal" class="text-3xl font-black mt-3">$0</h2>
</div>

<div class="card rounded-[28px] p-5">
<p class="text-slate-400 text-sm">📈 Trading</p>
<h2 id="tradingTotal" class="text-3xl font-black mt-3">$0</h2>
</div>

<div class="card rounded-[28px] p-5">
<p class="text-slate-400 text-sm">⛽ Gastos</p>
<h2 id="gastosTotal" class="text-3xl font-black mt-3 text-red-400">$0</h2>
</div>

</div>

<!-- APPS -->

<div class="space-y-5 mt-6">

<!-- MOTO -->

<div class="card rounded-[30px] overflow-hidden">

<button onclick="toggleDropdown('motoBox')"
class="w-full flex justify-between items-center p-5">

<div class="text-left">
<h2 class="text-xl font-bold">🏍️ Apps Moto</h2>
<p class="text-slate-400 text-sm mt-1">
Uber • Didi • InDrive
</p>
</div>

<span>▼</span>

</button>

<div id="motoBox"
class="dropdown p-5 border-t border-slate-800">

<div class="grid md:grid-cols-3 gap-4">

<input type="number" id="uber"
placeholder="Uber"
class="bg-black/30 border border-slate-700 rounded-2xl p-4">

<input type="number" id="didi"
placeholder="Didi"
class="bg-black/30 border border-slate-700 rounded-2xl p-4">

<input type="number" id="indrive"
placeholder="InDrive"
class="bg-black/30 border border-slate-700 rounded-2xl p-4">

</div>

<button onclick="guardarMoto()"
class="w-full mt-5 bg-emerald-500 text-black font-black rounded-2xl p-4">
Guardar Moto
</button>

</div>

</div>

<!-- VENTAS -->

<div class="card rounded-[30px] overflow-hidden">

<button onclick="toggleDropdown('ventasBox')"
class="w-full flex justify-between items-center p-5">

<div class="text-left">
<h2 class="text-xl font-bold">📦 Ventas Online</h2>
<p class="text-slate-400 text-sm mt-1">
Dropi • Master Shop
</p>
</div>

<span>▼</span>

</button>

<div id="ventasBox"
class="dropdown p-5 border-t border-slate-800">

<div class="grid md:grid-cols-2 gap-4">

<input type="number" id="dropi"
placeholder="Dropi"
class="bg-black/30 border border-slate-700 rounded-2xl p-4">

<input type="number" id="mastershop"
placeholder="Master Shop"
class="bg-black/30 border border-slate-700 rounded-2xl p-4">

</div>

<button onclick="guardarVentas()"
class="w-full mt-5 bg-blue-500 text-white font-black rounded-2xl p-4">
Guardar Ventas
</button>

</div>

</div>

<!-- TRADING -->

<div class="card rounded-[30px] overflow-hidden">

<button onclick="toggleDropdown('tradingBox')"
class="w-full flex justify-between items-center p-5">

<div class="text-left">
<h2 class="text-xl font-bold">📈 Trading</h2>
<p class="text-slate-400 text-sm mt-1">
Ganancias trading
</p>
</div>

<span>▼</span>

</button>

<div id="tradingBox"
class="dropdown p-5 border-t border-slate-800">

<input type="number" id="trading"
placeholder="Trading"
class="w-full bg-black/30 border border-slate-700 rounded-2xl p-4">

<button onclick="guardarTrading()"
class="w-full mt-5 bg-amber-500 text-black font-black rounded-2xl p-4">
Guardar Trading
</button>

</div>

</div>

<!-- GASTOS -->

<div class="card rounded-[30px] overflow-hidden">

<button onclick="toggleDropdown('gastosBox')"
class="w-full flex justify-between items-center p-5">

<div class="text-left">
<h2 class="text-xl font-bold">⛽ Gastos</h2>
<p class="text-slate-400 text-sm mt-1">
Gasolina • Comida
</p>
</div>

<span>▼</span>

</button>

<div id="gastosBox"
class="dropdown p-5 border-t border-slate-800">

<div class="grid md:grid-cols-2 gap-4">

<input type="number" id="gasolina"
placeholder="Gasolina"
class="bg-black/30 border border-slate-700 rounded-2xl p-4">

<input type="number" id="comida"
placeholder="Comida"
class="bg-black/30 border border-slate-700 rounded-2xl p-4">

</div>

<button onclick="guardarGastos()"
class="w-full mt-5 bg-red-500 text-white font-black rounded-2xl p-4">
Guardar Gastos
</button>

</div>

</div>

</div>

</div>

<script>

let periodo='semanal';

const metas={
semanal:500000,
mensual:2000000,
trimestral:6000000,
semestral:12000000
};

let registros=
JSON.parse(localStorage.getItem('financeVisionFinal')) || [];

function pesos(valor){

return new Intl.NumberFormat('es-CO',{
style:'currency',
currency:'COP',
maximumFractionDigits:0
}).format(valor);

}

function toggleDropdown(id){

document.getElementById(id)
.classList.toggle('show');

}

function togglePeriodo(){

const box=document.getElementById('periodoBox');
const flecha=document.getElementById('flechaPeriodo');

box.classList.toggle('show');
flecha.classList.toggle('rotate');

}

function cambiarPeriodo(p){

periodo=p;

document.getElementById('tituloPeriodo')
.innerText='Total '+p;

document.getElementById('periodoBox')
.classList.remove('show');

document.getElementById('flechaPeriodo')
.classList.remove('rotate');

render();

}

function guardar(tipo,valor){

if(valor<=0)return;

registros.push({
tipo,
valor,
fecha:new Date().toISOString()
});

localStorage.setItem(
'financeVisionFinal',
JSON.stringify(registros)
);

render();

}

function guardarMoto(){

guardar('uber',
Number(document.getElementById('uber').value)||0);

guardar('didi',
Number(document.getElementById('didi').value)||0);

guardar('indrive',
Number(document.getElementById('indrive').value)||0);

document.getElementById('uber').value='';
document.getElementById('didi').value='';
document.getElementById('indrive').value='';

}

function guardarVentas(){

guardar('dropi',
Number(document.getElementById('dropi').value)||0);

guardar('mastershop',
Number(document.getElementById('mastershop').value)||0);

document.getElementById('dropi').value='';
document.getElementById('mastershop').value='';

}

function guardarTrading(){

guardar('trading',
Number(document.getElementById('trading').value)||0);

document.getElementById('trading').value='';

}

function guardarGastos(){

guardar('gasolina',
Number(document.getElementById('gasolina').value)||0);

guardar('comida',
Number(document.getElementById('comida').value)||0);

document.getElementById('gasolina').value='';
document.getElementById('comida').value='';

}

function render(){

let uber=0;
let didi=0;
let indrive=0;
let dropi=0;
let mastershop=0;
let trading=0;
let gasolina=0;
let comida=0;

registros.forEach(r=>{

if(r.tipo==='uber')uber+=r.valor;
if(r.tipo==='didi')didi+=r.valor;
if(r.tipo==='indrive')indrive+=r.valor;
if(r.tipo==='dropi')dropi+=r.valor;
if(r.tipo==='mastershop')mastershop+=r.valor;
if(r.tipo==='trading')trading+=r.valor;
if(r.tipo==='gasolina')gasolina+=r.valor;
if(r.tipo==='comida')comida+=r.valor;

});

const totalMoto=uber+didi+indrive;
const totalVentas=dropi+mastershop;
const totalTrading=trading;
const totalGastos=gasolina+comida;

const totalGeneral=
(totalMoto+totalVentas+totalTrading)-totalGastos;

document.getElementById('motoTotal')
.innerText=pesos(totalMoto);

document.getElementById('ventasTotal')
.innerText=pesos(totalVentas);

document.getElementById('tradingTotal')
.innerText=pesos(totalTrading);

document.getElementById('gastosTotal')
.innerText=pesos(totalGastos);

document.getElementById('totalGeneral')
.innerText=pesos(totalGeneral);

document.getElementById('textoPeriodo')
.innerText='Total '+periodo+': '+pesos(totalGeneral);

const progresoGeneral=
Math.min((totalGeneral/12000000)*100,100);

document.getElementById('barraGeneral')
.style.width=progresoGeneral+'%';

document.getElementById('porcentajeGeneral')
.innerText=progresoGeneral.toFixed(1)+'%';

const progresoPeriodo=
Math.min((totalGeneral/metas[periodo])*100,100);

document.getElementById('barraPeriodo')
.style.width=progresoPeriodo+'%';

document.getElementById('porcentajePeriodo')
.innerText=progresoPeriodo.toFixed(1)+'%';

}

render();

</script>
<script>
// Cargar datos guardados al abrir
window.onload = function() {
    const campos = document.querySelectorAll('input');

    campos.forEach((campo, index) => {
        const valorGuardado = localStorage.getItem('campo_' + index);

        if(valorGuardado !== null){
            campo.value = valorGuardado;
        }
    });
}

// Guardar automáticamente al escribir
const campos = document.querySelectorAll('input');

campos.forEach((campo, index) => {
    campo.addEventListener('input', function(){
        localStorage.setItem('campo_' + index, campo.value);
    });
});
</script>
</body>
</html>
